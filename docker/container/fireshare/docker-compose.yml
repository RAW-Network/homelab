services:
  fireshare:
    container_name: fireshare
    image: shaneisrael/fireshare:latest
    ports:
      - 8008:80
    volumes:
      - ./data:/data
      - ./processed:/processed
      - ./videos:/videos
      - ./images:/images
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - SECRET_KEY=ThisisVerySecretDontOpenThisfileBecauseIMWachingYou
      - MINUTES_BETWEEN_VIDEO_SCANS=5
      - THUMBNAIL_VIDEO_LOCATION=0
      - ENABLE_TRANSCODING=true
      - STEAMGRIDDB_API_KEY=
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
