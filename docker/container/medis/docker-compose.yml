services:
  medis:
    image: ghcr.io/raw-network/medis:latest
    container_name: medis
    ports:
      - 3073:3000
    volumes:
      - ./data:/data
      - ./cookies:/cookies
    environment:
      - TZ=Asia/Makassar
      - MAX_QUEUE_LIMIT=2
      - AUTO_UPDATE_YTDLP=true
      - PLAYLIST_DOWNLOAD_LIMIT=1
    restart: unless-stopped
