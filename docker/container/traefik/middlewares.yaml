http:
  middlewares:
    rate-limit:
      rateLimit:
        average: 600
        burst: 100
        period: 1m

    public-rate-limit:
      rateLimit:
        average: 600
        burst: 100
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    basic-auth:
      basicAuth:
        users:
          {{- range (splitList "," (username:hash_password)) }}
           - "{{ . }}"
          {{- end }}
