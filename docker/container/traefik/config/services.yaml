http:
  routers:
    proxmox:
      rule: Host(`proxmox.mydomain.com`)
      service: proxmox

    mikrotik-router:
      rule: Host(`mikrotik.mydomain.com`)
      service: mikrotik

  services:
    proxmox:
      loadBalancer:
        servers:
          - url: http://192.168.100.:8006

    mikrotik:
      loadBalancer:
        servers:
          - url: http://192.168.100.1:80
