name: adguard-home
services:
  app:
    container_name: adguard-home
    image: adguard/adguardhome:v0.107.52
    volumes:
      - "/DATA/AppData/adguardhome/data/work:/opt/adguardhome/work"
      - "/DATA/AppData/adguardhome/data/conf:/opt/adguardhome/conf"
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 3001:3000/tcp
      - 3000:80/tcp
      - 853:853/tcp
      - 784:784/udp
    restart: unless-stopped


