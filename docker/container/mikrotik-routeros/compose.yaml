services:
  routeros:
    container_name: routeros
    network_mode: host
    image: evilfreelancer/docker-routeros:6.48.3
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "8280:80" #HTTP
      - "8291:8291" #Winbox
      - "1701:1701" #L2TP
