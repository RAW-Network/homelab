services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    volumes:
      - /DATA:/srv
      - /DATA/AppData/filebrowser/data/filebrowser.db:/database/filebrowser.db
      - /DATA/AppData/filebrowser/config/settings.json:/config/settings.json
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 8095:80
    restart: unless-stopped
